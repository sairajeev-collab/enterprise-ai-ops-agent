<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Enterprise AI Operations Agent</title>
  <style>
    :root {
      --bg: #0f1216; --card: #171b21; --line: #262c35; --text: #e6e9ee;
      --muted: #99a2b0; --accent: #6ea8fe; --good: #46d39a; --warn: #f0b45f;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      --sans: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--sans);
           line-height: 1.5; }
    header { padding: 20px 24px; border-bottom: 1px solid var(--line);
             display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 17px; margin: 0; font-weight: 650; }
    header .tag { color: var(--muted); font-size: 13px; }
    main { max-width: 980px; margin: 0 auto; padding: 24px; display: grid;
           grid-template-columns: 1fr 1fr; gap: 20px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px;
            padding: 18px; }
    .card h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .06em;
               color: var(--muted); margin: 0 0 14px; }
    label { display: block; font-size: 13px; color: var(--muted); margin: 12px 0 5px; }
    input, select, textarea { width: 100%; background: #0f1319; color: var(--text);
      border: 1px solid var(--line); border-radius: 8px; padding: 9px 11px; font-size: 14px;
      font-family: var(--sans); }
    textarea { min-height: 110px; resize: vertical; }
    button { margin-top: 16px; width: 100%; background: var(--accent); color: #06101f;
      border: 0; border-radius: 8px; padding: 11px; font-size: 14px; font-weight: 650;
      cursor: pointer; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    button.secondary { background: transparent; color: var(--accent);
      border: 1px solid var(--line); }
    .full { grid-column: 1 / -1; }
    .row { display: flex; gap: 12px; }
    .row > * { flex: 1; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 12px;
      font-weight: 650; }
    .badge.completed { background: rgba(70,211,154,.15); color: var(--good); }
    .badge.needs_review { background: rgba(240,180,95,.15); color: var(--warn); }
    .pipeline { display: flex; flex-wrap: wrap; gap: 6px; margin: 4px 0 16px; }
    .step { font-size: 12px; padding: 4px 9px; border-radius: 6px; border: 1px solid var(--line);
      color: var(--muted); }
    .step.done { color: var(--good); border-color: rgba(70,211,154,.4); }
    .kv { display: grid; grid-template-columns: 140px 1fr; gap: 6px 12px; font-size: 14px; }
    .kv div:nth-child(odd) { color: var(--muted); }
    .artifact { border: 1px solid var(--line); border-radius: 8px; padding: 12px; margin-top: 10px; }
    .artifact h3 { margin: 0 0 6px; font-size: 13px; }
    pre { background: #0f1319; border: 1px solid var(--line); border-radius: 8px; padding: 12px;
      overflow-x: auto; font-family: var(--mono); font-size: 12.5px; white-space: pre-wrap; }
    .meter { height: 6px; background: #0f1319; border-radius: 999px; overflow: hidden; margin-top: 6px; }
    .meter > span { display: block; height: 100%; background: var(--accent); }
    .error { color: #ff6b6b; font-size: 13px; margin-top: 10px; }
    .muted { color: var(--muted); font-size: 13px; }
    .examples { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .examples button { width: auto; margin: 0; padding: 5px 10px; font-size: 12px;
      background: transparent; color: var(--muted); border: 1px solid var(--line); font-weight: 500; }
    @media (max-width: 820px) { main { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <strong>◆</strong>
    <h1>Enterprise AI Operations Agent</h1>
    <span class="tag">LangGraph pipeline · classify → extract → retrieve → ticket → reply → notify → report</span>
  </header>

  <main>
    <section class="card" id="auth-card">
      <h2>1 · Authenticate</h2>
      <p class="muted">Exchange service credentials for a JWT (defaults are the local dev account).</p>
      <div class="row">
        <div><label>Account</label><input id="account" value="ops-service" /></div>
        <div><label>Password</label><input id="password" type="password" value="local-dev-password" /></div>
      </div>
      <button id="login-btn">Get token</button>
      <div class="error" id="auth-error"></div>
      <div class="muted" id="auth-ok" style="margin-top:10px;"></div>
    </section>

    <section class="card" id="submit-card">
      <h2>2 · Submit a request</h2>
      <div class="row">
        <div>
          <label>Channel</label>
          <select id="channel">
            <option>email</option><option>support_ticket</option><option>slack</option>
            <option>pdf</option><option>invoice</option><option>meeting_notes</option>
          </select>
        </div>
        <div><label>Subject</label><input id="subject" value="Refund request" /></div>
      </div>
      <label>Message</label>
      <textarea id="body">I need a refund for my invoice urgently. I was double charged this month. from Jane Smith jane@acme.com</textarea>
      <div class="examples" id="examples"></div>
      <button id="submit-btn" disabled>Run pipeline</button>
      <div class="error" id="submit-error"></div>
    </section>

    <section class="card full" id="result-card" style="display:none;">
      <h2>Result <span id="status-badge"></span></h2>
      <div class="pipeline" id="pipeline"></div>
      <div class="kv" id="summary"></div>
      <div id="artifacts"></div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    let token = null;

    const NODES = ["classify","extract","retrieve","create_ticket","draft_reply","notify","persist","generate_report"];

    const EXAMPLES = [
      ["Billing / urgent", "I need a refund for my invoice urgently. from Jane Smith jane@acme.com"],
      ["Tech / outage", "Production is down, we're seeing an outage across all regions right now."],
      ["Account", "I can't login to my account and it's blocking my work today. lee@umbrella.com"],
      ["Low signal → review", "Just wanted to say thanks for the great onboarding call yesterday."],
    ];

    function renderExamples() {
      EXAMPLES.forEach(([label, text]) => {
        const b = document.createElement("button");
        b.textContent = label;
        b.onclick = () => { $("body").value = text; };
        $("examples").appendChild(b);
      });
    }

    async function login() {
      $("auth-error").textContent = ""; $("auth-ok").textContent = "";
      try {
        const res = await fetch("/v1/auth/token", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ account_id: $("account").value, password: $("password").value }),
        });
        if (!res.ok) throw new Error("Invalid credentials (" + res.status + ")");
        token = (await res.json()).access_token;
        $("auth-ok").textContent = "Authenticated. Token acquired.";
        $("submit-btn").disabled = false;
      } catch (e) { $("auth-error").textContent = e.message; }
    }

    async function submit() {
      $("submit-error").textContent = "";
      $("submit-btn").disabled = true; $("submit-btn").textContent = "Running…";
      try {
        const payload = { channel: $("channel").value, subject: $("subject").value, body: $("body").value };
        const res = await fetch("/v1/requests?inline=true", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
          body: JSON.stringify(payload),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error((err.error && err.error.message) || ("Request failed: " + res.status));
        }
        const { id } = await res.json();
        const status = await (await fetch("/v1/requests/" + id, {
          headers: { "Authorization": "Bearer " + token },
        })).json();
        render(status);
      } catch (e) { $("submit-error").textContent = e.message; }
      finally { $("submit-btn").disabled = false; $("submit-btn").textContent = "Run pipeline"; }
    }

    function render(s) {
      $("result-card").style.display = "block";
      $("status-badge").innerHTML =
        `<span class="badge ${s.status}">${s.status.replace("_", " ")}</span>`;

      const kinds = new Set((s.artifacts || []).map((a) => a.kind));
      const reached = s.status === "needs_review"
        ? ["classify"]
        : NODES.filter((n) => n !== "generate_report" || kinds.has("report"));
      $("pipeline").innerHTML = NODES.map((n) => {
        const done = s.status === "completed" || (s.status === "needs_review" && n === "classify");
        return `<span class="step ${done ? "done" : ""}">${done ? "✓ " : ""}${n}</span>`;
      }).join("");

      const conf = s.confidence != null ? Math.round(s.confidence * 100) : null;
      $("summary").innerHTML = `
        <div>Request type</div><div>${s.request_type || "—"}</div>
        <div>Priority</div><div>${s.priority || "—"}</div>
        <div>Confidence</div><div>${conf != null ? conf + "%" : "—"}
          ${conf != null ? `<div class="meter"><span style="width:${conf}%"></span></div>` : ""}</div>
      `;

      const box = $("artifacts"); box.innerHTML = "";
      (s.artifacts || []).forEach((a) => {
        const el = document.createElement("div");
        el.className = "artifact";
        let inner = `<h3>${a.kind}${a.ref ? " · " + a.ref : ""}</h3>`;
        if (a.kind === "reply" && a.payload.body) inner += `<pre>${escape(a.payload.body)}</pre>`;
        else if (a.kind === "report" && a.payload.report) inner += `<pre>${escape(a.payload.report)}</pre>`;
        else if (a.kind === "review" && a.payload.reason) inner += `<div class="muted">${escape(a.payload.reason)}</div>`;
        else inner += `<pre>${escape(JSON.stringify(a.payload, null, 2))}</pre>`;
        el.innerHTML = inner;
        box.appendChild(el);
      });
    }

    function escape(s) {
      return String(s).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
    }

    $("login-btn").onclick = login;
    $("submit-btn").onclick = submit;
    renderExamples();
  </script>
</body>
</html>
