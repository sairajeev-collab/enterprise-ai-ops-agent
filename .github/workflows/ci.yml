name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint · typecheck · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('pyproject.toml') }}

      - name: Install
        run: pip install -e ".[dev]"

      - name: Ruff (lint + format)
        run: |
          ruff check app tests scripts evals
          ruff format --check app tests scripts evals

      - name: Mypy
        run: mypy app evals

      # The suite is hermetic (SQLite + fakeredis + sandbox adapters): no service
      # containers, no secrets. The coverage gate is enforced here.
      - name: Pytest
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80

      # Regression gate on classification quality using the deterministic sandbox.
      - name: Evaluation harness
        run: python -m evals --min-accuracy 0.90

      # Fail the build if any external idempotency key becomes non-deterministic
      # (the "47 duplicate tickets" guard, ADR-0017).
      - name: Idempotency check
        run: python -m scripts.idempotency_check

  docker:
    name: build image
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: enterprise-ai-ops-agent:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
